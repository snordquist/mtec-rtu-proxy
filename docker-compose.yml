services:
  modbus-rtu-tcp-proxy:
    build: .
    image: modbus-rtu-tcp-proxy:local
    container_name: modbus-rtu-tcp-proxy
    restart: unless-stopped
    env_file: .env
    ports:
      - "${LISTEN_PORT:-502}:${LISTEN_PORT:-502}"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
